<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống tạo test case tích hợp AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #334155;
        }
        pre, code {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Custom scrollbar for tables */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <svg class="w-8 h-8 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    <a href="/" class="text-xl font-bold text-slate-800 tracking-tight">Hệ thống tạo test case tích hợp AI</a>
                    <span class="px-2 py-0.5 text-xs font-semibold bg-blue-100 text-blue-700 rounded-md border border-blue-200 ml-2">Tích hợp AI</span>
                </div>
                <div class="flex items-center">
                    <a href="/create" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-4 rounded-md transition flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Tạo Test Case
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Success/Error Alert -->
        <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-md shadow-sm">
            <div class="flex items-center">
                <svg class="h-5 w-5 text-red-500 mr-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>
                <p class="text-sm font-medium text-red-800" th:text="${error}"></p>
            </div>
        </div>
        <div th:if="${success}" class="bg-green-50 border-l-4 border-green-500 p-4 mb-6 rounded-r-md shadow-sm">
            <div class="flex items-center">
                <svg class="h-5 w-5 text-green-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                <p class="text-sm font-medium text-green-800" th:text="${success}"></p>
            </div>
        </div>

        <!-- Header & Search -->
        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-bold text-slate-800">Ngân Hàng Đề Thi</h1>
            <form action="/" method="get" class="w-full sm:w-96 flex">
                <input type="text" name="search" th:value="${searchQuery}" placeholder="Tìm kiếm bài tập..." class="w-full border border-slate-300 rounded-l-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <button type="submit" class="bg-slate-100 hover:bg-slate-200 border border-l-0 border-slate-300 rounded-r-md px-4 py-2 text-slate-600 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
            </form>
        </div>
            
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-50">
                            <tr>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider w-16">#</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Tiêu Đề</th>
                                <th scope="col" class="px-6 py-4 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider w-24">Thời Gian</th>
                                <th scope="col" class="px-6 py-4 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider w-24">Bộ Nhớ</th>
                                <th scope="col" class="px-6 py-4 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider w-24">Hành Động</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-slate-200">
                            <tr th:if="${#lists.isEmpty(problems)}">
                                <td colspan="5" class="px-6 py-12 text-center text-slate-500 bg-slate-50/50">
                                    <svg class="mx-auto h-12 w-12 text-slate-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                    <p class="text-sm font-medium" th:text="${searchQuery != null ? 'Không tìm thấy bài tập phù hợp' : 'Chưa có bài tập nào'}"></p>
                                    <p th:if="${searchQuery == null}" class="text-xs mt-1 text-slate-400">Hãy nhấn "Tạo Test Case" để bắt đầu.</p>
                                </td>
                            </tr>
                            <tr th:each="p, stat : ${problems}" class="hover:bg-blue-50/30 transition-colors group">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 font-mono" th:text="${stat.count}">1</td>
                                <td class="px-6 py-4">
                                    <a th:href="@{'/problem/' + ${p.id} + '?index=' + ${stat.count}}" class="text-sm font-medium text-blue-600 hover:text-blue-800 group-hover:underline" th:text="${p.title}">Problem Title</a>
                                    <div class="text-xs text-slate-400 mt-1 line-clamp-1" th:text="${p.description}">Short description...</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 text-center font-mono" th:text="${p.timeLimit} + 'ms'">1000ms</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 text-center font-mono" th:text="${p.memoryLimit} + 'MB'">256MB</td>
                                <td class="px-6 py-4 whitespace-nowrap text-center">
                                    <form th:action="@{'/problem/' + ${p.id} + '/delete'}" method="post" onsubmit="return confirm('Bạn có chắc chắn muốn xoá bài tập này? Hành động này sẽ xoá toàn bộ test cases đi kèm.')">
                                        <button type="submit" class="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded-md transition-colors" title="Xoá">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
