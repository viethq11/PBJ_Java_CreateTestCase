server:
  port: 8080

spring:
  application:
    name: pbj-judge
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    master:
      jdbc-url: jdbc:mysql://localhost:3306/pbj_judge?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
      username: root
      password: root_password
      driver-class-name: com.mysql.cj.jdbc.Driver
    slave:
      jdbc-url: jdbc:mysql://localhost:3307/pbj_judge?allowPublicKeyRetrieval=true&useSSL=false
      username: root
      password: root_password
      driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

testcase:
  storage-dir: /app/testcase-data
  legacy-migration:
    enabled: true
    batch-size: 500

async:
  core-pool-size: 4
  max-pool-size: 8
  queue-capacity: 50

ai:
  debug-dir: ${AI_DEBUG_DIR:/app/ai-debug}
  queue:
    max-concurrency: ${AI_QUEUE_MAX_CONCURRENCY:1}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    api-keys: ${GEMINI_API_KEYS:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    pro-model: ${GEMINI_PRO_MODEL:${GEMINI_MODEL:gemini-2.5-flash}}
    timeout-seconds: 120
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.1:8b}
    timeout-seconds: 90
