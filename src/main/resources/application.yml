server:
  port: 8080

spring:
  application:
    name: pbj-judge
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    master:
      jdbc-url: jdbc:mysql://localhost:3306/pbj_judge?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
      username: root
      password: root_password
      driver-class-name: com.mysql.cj.jdbc.Driver
    slave:
      jdbc-url: jdbc:mysql://localhost:3307/pbj_judge?allowPublicKeyRetrieval=true&useSSL=false
      username: root
      password: root_password
      driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

testcase:
  storage-dir: /app/testcase-data

async:
  core-pool-size: 4
  max-pool-size: 8
  queue-capacity: 50

ai:
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.0-flash
    pro-model: gemini-2.5-flash
    timeout-seconds: 120
  openai:
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY}
    model: gpt-4o
    timeout-seconds: 120
